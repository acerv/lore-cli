# Copy this file to config.toml and adjust the values below.

[lore]
# Base URL of the lore / public-inbox server.
server  = "https://lore.kernel.org"
# Mailing list / inbox name to browse (the path segment after the server).
project = "ltp"

[ui]
# Number of patches fetched per page (200 is the server-side maximum).
page_size = 200
# Number of threads fetched in parallel to determine merge/review status.
status_concurrency = 6

[cache]
# How long (in seconds) a cached thread mbox is trusted before it is
# re-fetched from the server. Mailing-list threads gain new patches and
# replies over time, so an unbounded cache would keep showing a stale thread.
# Set to 0 to cache forever (never re-fetch). Default: 900 (15 minutes).
max_age_secs = 900

[status]
# Case-insensitive regular expressions that mark a patch as merged (shown
# green). Each entry is matched against every non-quoted line of the thread.
# Maintainers phrase this differently per subsystem — list every pattern that
# applies. A single string also works: merged_markers = "^applied".
merged_markers = [
	# Line begins with the action verb, followed by "thanks", a target tree
	# ("to <tree>"), or end-of-statement — e.g. "Applied, thanks",
	# "Merged.", "Pushed to for-next".
	"^\\s*(applied|merged|pushed)(,?\\s+thanks|\\s+to\\s+\\S+|[.!]|\\s*$)",
	# "thanks, applied" / "thanks merged".
	"^\\s*thanks,?\\s+(applied|merged|pushed)\\b",
	# "patchset applied", "series merged" as a line-leading statement.
	"^\\s*(patch(set|es)?|series)\\s+(applied|merged)(,?\\s+thanks|\\s+to\\s+\\S+|[.!]?\\s*$)",
]
