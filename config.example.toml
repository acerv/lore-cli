# Copy this file to config.toml and adjust the values below.

[lore]
# Base URL of the lore / public-inbox server.
server  = "https://lore.kernel.org"
# Mailing list / inbox name to browse (the path segment after the server).
project = "amd-gfx"

[ui]
# Number of patches fetched per page (200 is the server-side maximum).
page_size = 200
# Number of threads fetched in parallel to determine merge/review status.
status_concurrency = 6
